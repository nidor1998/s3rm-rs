# ============================================================
# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
# ============================================================

# ---- 1. Advisories (RustSec Advisory DB) ----
[advisories]
# All vulnerability/unsound/notice advisories are errors by default.
# To ignore a specific advisory, add it here with a reason:
ignore = [
    { id = "RUSTSEC-2026-0049", reason = "only affects rustls-webpki 0.101.7 pulled transitively by AWS SDK via rustls 0.21.x; no patched 0.101.x release exists; risk is negligible as it only impacts CRL revocation checking and requires CA compromise" },
]

# ---- 2. Licenses ----
[licenses]
allow = [
    "Apache-2.0 WITH LLVM-exception",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

# ---- 3. Bans ----
[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = [
    { crate = "openssl-sys", reason = "rustls is used; openssl is unnecessary" },
]

# ---- 4. Sources ----
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
